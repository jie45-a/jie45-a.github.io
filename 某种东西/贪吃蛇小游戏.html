<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;

}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #1a1a2e;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  user-select: none;
  -webkit-user-select: none;
}

.container {
  text-align: center;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding: 0 4px;
}

.score-box {
  background: #16213e;
  color: #e94560;
  padding: 10px 24px;
  border-radius: 12px;
  font-size: 20px;
  font-weight: bold;
  letter-spacing: 1px;
  box-shadow: 0 4px 15px rgba(233, 69, 96, 0.2);
}

.best-score-box {
  background: #16213e;
  color: #f5c518;
  padding: 10px 24px;
  border-radius: 12px;
  font-size: 20px;
  font-weight: bold;
  letter-spacing: 1px;
  box-shadow: 0 4px 15px rgba(245, 197, 24, 0.2);
}

canvas {
  border: 3px solid #0f3460;
  border-radius: 8px;
  background: #16213e;
  box-shadow: 0 0 30px rgba(233, 69, 96, 0.15), 0 0 60px rgba(15, 52, 96, 0.3);
  display: block;
}

.controls {
  margin-top: 16px;
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn {
  background: #e94560;
  color: #fff;
  border: none;
  padding: 10px 28px;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  font-weight: bold;
  letter-spacing: 1px;
  transition: all 0.2s;
  box-shadow: 0 4px 12px rgba(233, 69, 96, 0.3);
}

.btn:hover {
  background: #c73652;
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(233, 69, 96, 0.4);
}

.btn:active {
  transform: translateY(0);
}

.btn-secondary {
  background: #0f3460;
  box-shadow: 0 4px 12px rgba(15, 52, 96, 0.3);
}

.btn-secondary:hover {
  background: #0a2540;
}

.tip {
  color: #aaa;
  margin-top: 12px;
  font-size: 13px;
  letter-spacing: 0.5px;
}

/* 移动端方向键 */
.mobile-dpad {
  display: none;
  margin-top: 16px;
}

.dpad-row {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 6px;
}

.dpad-btn {
  width: 60px;
  height: 60px;
  background: #16213e;
  border: 2px solid #0f3460;
  border-radius: 12px;
  color: #e94560;
  font-size: 26px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.dpad-btn:active {
  background: #e94560;
  color: #fff;
  border-color: #e94560;
}

@media (max-width: 600px) {
  .mobile-dpad {
    display: block;
  }
  .header {
    margin-bottom: 10px;
  }
  .score-box, .best-score-box {
    padding: 8px 16px;
    font-size: 16px;
  }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="score-box">🍎 得分 <span id="score">0</span></div>
    <div class="best-score-box">🏆 最佳 <span id="bestScore">0</span></div>
  </div>

  <canvas id="canvas" width="400" height="400"></canvas>

  <div class="mobile-dpad">
    <div class="dpad-row">
      <div class="dpad-btn" data-dir="up">▲</div>
    </div>
    <div class="dpad-row">
      <div class="dpad-btn" data-dir="left">◀</div>
      <div class="dpad-btn" data-dir="down">▼</div>
      <div class="dpad-btn" data-dir="right">▶</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="startBtn">开始游戏</button>
    <button class="btn btn-secondary" id="pauseBtn">暂停</button>
  </div>
  <div class="tip">方向键 / WASD 控制方向 | 空格键暂停</div>
</div>

<script>
(function() {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestScoreEl = document.getElementById('bestScore');
  const startBtn = document.getElementById('startBtn');
  const pauseBtn = document.getElementById('pauseBtn');

  const GRID = 20;
  const COLS = canvas.width / GRID;
  const ROWS = canvas.height / GRID;

  let snake = [];
  let food = {};
  let direction = { x: 1, y: 0 };
  let nextDirection = { x: 1, y: 0 };
  let score = 0;
  let bestScore = 0;
  let gameLoop = null;
  let running = false;
  let paused = false;
  let speed = 100;
  let trail = []; // 拖尾粒子

  // 从 localStorage 加载最佳成绩
  try {
    bestScore = parseInt(localStorage.getItem('snakeBestScore')) || 0;
    bestScoreEl.textContent = bestScore;
  } catch (e) {}

  function saveBestScore() {
    if (score > bestScore) {
      bestScore = score;
      bestScoreEl.textContent = bestScore;
      try {
        localStorage.setItem('snakeBestScore', bestScore);
      } catch (e) {}
    }
  }

  function randomFood() {
    const pos = {};
    do {
      pos.x = Math.floor(Math.random() * COLS);
      pos.y = Math.floor(Math.random() * ROWS);
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    return pos;
  }

  function init() {
    const startX = Math.floor(COLS / 2);
    const startY = Math.floor(ROWS / 2);
    snake = [
      { x: startX, y: startY },
      { x: startX - 1, y: startY },
      { x: startX - 2, y: startY },
    ];
    direction = { x: 1, y: 0 };
    nextDirection = { x: 1, y: 0 };
    score = 0;
    speed = 100;
    trail = [];
    scoreEl.textContent = '0';
    food = randomFood();
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 绘制网格线
    ctx.strokeStyle = 'rgba(15, 52, 96, 0.3)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= COLS; i++) {
      ctx.beginPath();
      ctx.moveTo(i * GRID, 0);
      ctx.lineTo(i * GRID, canvas.height);
      ctx.stroke();
    }
    for (let i = 0; i <= ROWS; i++) {
      ctx.beginPath();
      ctx.moveTo(0, i * GRID);
      ctx.lineTo(canvas.width, i * GRID);
      ctx.stroke();
    }

    // 绘制食物
    const fx = food.x * GRID + GRID / 2;
    const fy = food.y * GRID + GRID / 2;
    const pulse = 1 + 0.1 * Math.sin(Date.now() / 200);

    ctx.save();
    ctx.translate(fx, fy);
    ctx.scale(pulse, pulse);

    // 光晕
    const glow = ctx.createRadialGradient(0, 0, 2, 0, 0, GRID * 0.7);
    glow.addColorStop(0, 'rgba(233, 69, 96, 0.6)');
    glow.addColorStop(1, 'rgba(233, 69, 96, 0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, GRID * 0.7, 0, Math.PI * 2);
    ctx.fill();

    // 食物主体
    ctx.fillStyle = '#e94560';
    ctx.beginPath();
    ctx.arc(0, 0, GRID * 0.4, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-2, -3, 2.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();

    // 绘制拖尾
    for (let i = trail.length - 1; i >= 0; i--) {
      const t = trail[i];
      const alpha = t.life / t.maxLife;
      ctx.fillStyle = `rgba(233, 69, 96, ${alpha * 0.4})`;
      ctx.beginPath();
      ctx.arc(t.x * GRID + GRID / 2, t.y * GRID + GRID / 2, GRID * 0.35 * alpha, 0, Math.PI * 2);
      ctx.fill();
    }

    // 绘制蛇
    snake.forEach((seg, i) => {
      const cx = seg.x * GRID + GRID / 2;
      const cy = seg.y * GRID + GRID / 2;
      const ratio = 1 - i / (snake.length + 10);

      let color;
      if (i === 0) {
        color = `hsl(${140 + ratio * 40}, 80%, ${45 + ratio * 15}%)`;
      } else {
        color = `hsl(${140 + ratio * 40}, 70%, ${35 + ratio * 20}%)`;
      }

      // 身体光晕
      const segGlow = ctx.createRadialGradient(cx, cy, GRID * 0.2, cx, cy, GRID * 0.55);
      segGlow.addColorStop(0, color);
      segGlow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = segGlow;
      ctx.beginPath();
      ctx.arc(cx, cy, GRID * 0.55, 0, Math.PI * 2);
      ctx.fill();

      // 身体主体
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(seg.x * GRID + 2, seg.y * GRID + 2, GRID - 4, GRID - 4, i === 0 ? 6 : 4);
      ctx.fill();
    });

    // 蛇头眼睛
    if (snake.length > 0) {
      const head = snake[0];
      const hx = head.x * GRID + GRID / 2;
      const hy = head.y * GRID + GRID / 2;

      ctx.fillStyle = '#fff';
      let eyeOffX = 0, eyeOffY = 0;
      if (direction.x === 1) { eyeOffX = 3; eyeOffY = 0; }
      else if (direction.x === -1) { eyeOffX = -3; eyeOffY = 0; }
      else if (direction.y === -1) { eyeOffX = 0; eyeOffY = -3; }
      else if (direction.y === 1) { eyeOffX = 0; eyeOffY = 3; }

      const perpX = direction.y * 4;
      const perpY = direction.x * 4;

      ctx.beginPath();
      ctx.arc(hx + eyeOffX + perpX, hy + eyeOffY + perpY, 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(hx + eyeOffX - perpX, hy + eyeOffY - perpY, 3, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.arc(hx + eyeOffX + perpX + direction.x, hy + eyeOffY + perpY + direction.y, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(hx + eyeOffX - perpX + direction.x, hy + eyeOffY - perpY + direction.y, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // 暂停/结束遮罩
    if (!running || paused) {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#fff';
      ctx.font = 'bold 28px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      const msg = !running ? '游戏结束' : '已暂停';
      ctx.fillText(msg, canvas.width / 2, canvas.height / 2 - 10);

      ctx.font = '16px "Segoe UI", sans-serif';
      ctx.fillStyle = '#aaa';
      const sub = !running ? '点击"开始游戏"重新开始' : '按空格键继续';
      ctx.fillText(sub, canvas.width / 2, canvas.height / 2 + 25);
      ctx.textAlign = 'start';
    }
  }

  function update() {
    direction = { ...nextDirection };

    const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

    // 碰墙检测
    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
      gameOver();
      return;
    }

    // 碰自己检测
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      gameOver();
      return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10;
      scoreEl.textContent = score;
      saveBestScore();
      food = randomFood();
      // 加速
      if (speed > 50) {
        speed -= 1;
        clearInterval(gameLoop);
        gameLoop = setInterval(tick, speed);
      }
      // 添加拖尾
      for (let i = 0; i < 5; i++) {
        trail.push({ x: food.x, y: food.y, life: 15, maxLife: 15 });
      }
    } else {
      snake.pop();
    }

    // 更新拖尾
    for (let i = trail.length - 1; i >= 0; i--) {
      trail[i].life--;
      if (trail[i].life <= 0) trail.splice(i, 1);
    }
  }

  function tick() {
    update();
    draw();
  }

  function gameOver() {
    running = false;
    clearInterval(gameLoop);
    gameLoop = null;
    saveBestScore();
    draw();
  }

  function startGame() {
    clearInterval(gameLoop);
    init();
    running = true;
    paused = false;
    pauseBtn.textContent = '暂停';
    gameLoop = setInterval(tick, speed);
    draw();
  }

  function togglePause() {
    if (!running) return;
    paused = !paused;
    if (paused) {
      clearInterval(gameLoop);
      gameLoop = null;
      pauseBtn.textContent = '继续';
    } else {
      pauseBtn.textContent = '暂停';
      gameLoop = setInterval(tick, speed);
    }
    draw();
  }

  // 键盘事件
  document.addEventListener('keydown', (e) => {
    if (!running || paused) {
      if (e.key === ' ' || e.code === 'Space') {
        e.preventDefault();
        if (!running) {
          startGame();
        } else {
          togglePause();
        }
        return;
      }
      if (!running) return;
    }

    const keyMap = {
      ArrowUp:    { x: 0, y: -1 },
      ArrowDown:  { x: 0, y: 1 },
      ArrowLeft:  { x: -1, y: 0 },
      ArrowRight: { x: 1, y: 0 },
      w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
      s: { x: 0, y: 1 },  S: { x: 0, y: 1 },
      a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
      d: { x: 1, y: 0 },  D: { x: 1, y: 0 },
    };

    const newDir = keyMap[e.key];
    if (newDir) {
      e.preventDefault();
      // 禁止反向
      if (newDir.x !== -direction.x || newDir.y !== -direction.y) {
        nextDirection = newDir;
      }
    }

    if (e.key === ' ' || e.code === 'Space') {
      e.preventDefault();
      togglePause();
    }
  });

  // 移动端方向键
  document.querySelectorAll('.dpad-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (!running || paused) return;
      const dirMap = {
        up:    { x: 0, y: -1 },
        down:  { x: 0, y: 1 },
        left:  { x: -1, y: 0 },
        right: { x: 1, y: 0 },
      };
      const newDir = dirMap[btn.dataset.dir];
      if (newDir && (newDir.x !== -direction.x || newDir.y !== -direction.y)) {
        nextDirection = newDir;
      }
    });
  });

  // 触摸滑动支持
  let touchStartX = 0, touchStartY = 0;
  canvas.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    e.preventDefault();
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    if (!running || paused) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    const absDx = Math.abs(dx), absDy = Math.abs(dy);
    if (Math.max(absDx, absDy) < 20) return;

    let newDir;
    if (absDx > absDy) {
      newDir = { x: dx > 0 ? 1 : -1, y: 0 };
    } else {
      newDir = { x: 0, y: dy > 0 ? 1 : -1 };
    }
    if (newDir.x !== -direction.x || newDir.y !== -direction.y) {
      nextDirection = newDir;
    }
    e.preventDefault();
  }, { passive: false });

  startBtn.addEventListener('click', startGame);
  pauseBtn.addEventListener('click', togglePause);

  // 初始绘制
  init();
  draw();
})();
</script>
</body>
</html>
