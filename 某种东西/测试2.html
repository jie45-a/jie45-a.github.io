<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 音乐播放器</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a2e;
            --surface2: #16213e;
            --primary: #e94560;
            --primary-hover: #ff6b81;
            --text: #e0e0e0;
            --text-secondary: #a0a0a0;
            --border: #2a2a4a;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(233, 68, 96, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(100, 100, 255, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(233, 68, 96, 0.05) 0%, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 1000px;
            height: 92vh;
            max-height: 750px;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border-radius: 20px;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        /* ========== Header ========== */
        .header {
            padding: 20px 28px 16px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 14px;
            background: linear-gradient(135deg, var(--primary), #ff6b81);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid var(--border);
            border-radius: 30px;
            background: var(--surface2);
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(233, 68, 96, 0.15);
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .search-box button {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            background: var(--primary);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }

        .search-box button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(233, 68, 96, 0.4);
        }

        .search-box button:active {
            transform: translateY(0);
        }

        /* ========== Main Content ========== */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ========== Results Panel ========== */
        .results-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid var(--border);
        }

        .results-header {
            padding: 14px 24px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .results-count {
            background: var(--surface2);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.78rem;
        }

        .results-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .results-list::-webkit-scrollbar {
            width: 6px;
        }

        .results-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .results-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .track-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 4px;
            position: relative;
        }

        .track-item:hover {
            background: var(--surface2);
        }

        .track-item.active {
            background: rgba(233, 68, 96, 0.15);
            border: 1px solid rgba(233, 68, 96, 0.3);
        }

        .track-item.playing {
            background: rgba(233, 68, 96, 0.2);
        }

        .track-thumb {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--surface2);
        }

        .track-thumb-placeholder {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--surface2), var(--border));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .track-info {
            flex: 1;
            min-width: 0;
        }

        .track-name {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .track-artist {
            font-size: 0.78rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-duration {
            font-size: 0.78rem;
            color: var(--text-secondary);
            flex-shrink: 0;
        }

        .track-add-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .track-add-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(233, 68, 96, 0.1);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px;
        }

        .empty-state .icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
            opacity: 0.6;
        }

        .empty-state p {
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ========== Player Panel ========== */
        .player-panel {
            width: 360px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            padding: 20px;
            background: var(--surface2);
        }

        .now-playing-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            text-align: center;
        }

        .album-art-container {
            width: 100%;
            aspect-ratio: 1;
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            background: var(--surface);
        }

        .album-art-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .album-art-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            background: linear-gradient(135deg, #1a1a2e, #2a2a4a);
        }

        .album-art-container.playing img {
            animation: albumPulse 3s ease-in-out infinite;
        }

        @keyframes albumPulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.03);
            }
        }

        .now-playing-info {
            text-align: center;
            margin-bottom: 16px;
            min-height: 48px;
        }

        .now-playing-title {
            font-weight: 700;
            font-size: 1.05rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .now-playing-artist {
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        /* Progress Bar */
        .progress-container {
            margin-bottom: 8px;
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background: var(--border);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            transition: height 0.15s;
        }

        .progress-bar:hover {
            height: 7px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #ff6b81);
            border-radius: 3px;
            position: relative;
            transition: width 0.1s linear;
            width: 0%;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: -6px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .progress-bar:hover .progress-fill::after {
            opacity: 1;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.72rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        /* Controls */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 16px;
        }

        .ctrl-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text);
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ctrl-btn:hover {
            color: var(--primary);
            background: rgba(233, 68, 96, 0.1);
        }

        .ctrl-btn.play-btn {
            width: 56px;
            height: 56px;
            background: var(--primary);
            color: #fff;
            font-size: 1.3rem;
            box-shadow: 0 4px 15px rgba(233, 68, 96, 0.4);
        }

        .ctrl-btn.play-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(233, 68, 96, 0.5);
        }

        /* Volume */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 10px;
            margin-bottom: 16px;
        }

        .volume-icon {
            font-size: 1.1rem;
            color: var(--text-secondary);
            cursor: pointer;
            flex-shrink: 0;
        }

        .volume-slider {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--border);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }

        /* Playlist in Player */
        .playlist-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .playlist-mini {
            flex: 1;
            overflow-y: auto;
            min-height: 60px;
            max-height: 160px;
        }

        .playlist-mini::-webkit-scrollbar {
            width: 4px;
        }

        .playlist-mini::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.82rem;
        }

        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .playlist-item.active {
            background: rgba(233, 68, 96, 0.2);
            color: var(--primary);
        }

        .playlist-item .index {
            width: 20px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.75rem;
            flex-shrink: 0;
        }

        .playlist-item.active .index {
            color: var(--primary);
        }

        .playlist-item .name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .playlist-item .remove-btn {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: var(--transition);
        }

        .playlist-item:hover .remove-btn {
            opacity: 1;
        }

        .playlist-item .remove-btn:hover {
            color: var(--primary);
            background: rgba(233, 68, 96, 0.15);
        }

        .playlist-empty {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8rem;
            padding: 20px;
        }

        /* ========== Toast ========== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--surface2);
            color: var(--text);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.85rem;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            z-index: 1000;
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ========== Responsive ========== */
        @media (max-width: 768px) {
            .container {
                max-width: 100%;
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
            }

            .main-content {
                flex-direction: column;
            }

            .results-panel {
                border-right: none;
                border-bottom: 1px solid var(--border);
                flex: 1;
            }

            .player-panel {
                width: 100%;
                flex-shrink: 0;
                max-height: 55%;
                overflow-y: auto;
            }

            .album-art-container {
                max-width: 200px;
                margin: 0 auto 16px;
            }

            .playlist-mini {
                max-height: 100px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🎵 音乐播放器</h1>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索歌曲、歌手或专辑..." autocomplete="off">
                <button id="searchBtn">🔍 搜索</button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Results Panel -->
            <div class="results-panel">
                <div class="results-header">
                    <span id="resultsLabel">搜索结果</span>
                    <span class="results-count" id="resultsCount" style="display:none;">0 首</span>
                </div>
                <div class="results-list" id="resultsList">
                    <div class="empty-state">
                        <div class="icon">🎶</div>
                        <p>搜索你喜欢的音乐<br>然后点击播放吧</p>
                    </div>
                </div>
            </div>

            <!-- Player Panel -->
            <div class="player-panel">
                <div class="now-playing-label">正在播放</div>

                <div class="album-art-container" id="albumArtContainer">
                    <div class="album-art-placeholder">🎵</div>
                </div>

                <div class="now-playing-info">
                    <div class="now-playing-title" id="nowPlayingTitle">暂无播放</div>
                    <div class="now-playing-artist" id="nowPlayingArtist">选择一首歌曲开始</div>
                </div>

                <div class="progress-container">
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">0:00</span>
                </div>

                <div class="controls">
                    <button class="ctrl-btn" id="prevBtn" title="上一首">⏮</button>
                    <button class="ctrl-btn play-btn" id="playBtn" title="播放/暂停">▶</button>
                    <button class="ctrl-btn" id="nextBtn" title="下一首">⏭</button>
                    <button class="ctrl-btn" id="shuffleBtn" title="随机播放">🔀</button>
                </div>

                <div class="volume-container">
                    <span class="volume-icon" id="volumeIcon">🔊</span>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70" title="音量">
                </div>

                <div class="playlist-label">播放列表</div>
                <div class="playlist-mini" id="playlistMini">
                    <div class="playlist-empty">播放列表为空，搜索并添加歌曲吧</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        (function() {
            // ============ DOM 元素 ============
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            const resultsList = document.getElementById('resultsList');
            const resultsLabel = document.getElementById('resultsLabel');
            const resultsCount = document.getElementById('resultsCount');
            const playlistMini = document.getElementById('playlistMini');
            const albumArtContainer = document.getElementById('albumArtContainer');
            const nowPlayingTitle = document.getElementById('nowPlayingTitle');
            const nowPlayingArtist = document.getElementById('nowPlayingArtist');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const currentTimeEl = document.getElementById('currentTime');
            const totalTimeEl = document.getElementById('totalTime');
            const playBtn = document.getElementById('playBtn');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const shuffleBtn = document.getElementById('shuffleBtn');
            const volumeSlider = document.getElementById('volumeSlider');
            const volumeIcon = document.getElementById('volumeIcon');
            const toast = document.getElementById('toast');

            // ============ 状态 ============
            let playlist = [];
            let currentIndex = -1;
            let isPlaying = false;
            let isShuffle = false;
            let searchResults = [];
            let audio = null;
            let progressInterval = null;
            let toastTimer = null;

            // ============ 初始化音频 ============
            function initAudio() {
                if (audio) {
                    audio.pause();
                    audio.src = '';
                }
                audio = new Audio();
                audio.volume = volumeSlider.value / 100;
                audio.addEventListener('ended', onTrackEnded);
                audio.addEventListener('error', onTrackError);
                audio.addEventListener('loadedmetadata', updateTotalTime);
            }

            initAudio();

            // ============ Toast ============
            function showToast(msg) {
                if (toastTimer) clearTimeout(toastTimer);
                toast.textContent = msg;
                toast.classList.add('show');
                toastTimer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2000);
            }

            // ============ 时间格式化 ============
            function formatTime(seconds) {
                if (isNaN(seconds) || seconds < 0) return '0:00';
                const m = Math.floor(seconds / 60);
                const s = Math.floor(seconds % 60);
                return `${m}:${s.toString().padStart(2, '0')}`;
            }

            // ============ 搜索 ============
            async function searchMusic(query) {
                if (!query.trim()) return;

                resultsList.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
                resultsLabel.textContent = `搜索: "${query}"`;

                try {
                    const response = await fetch(
                        `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&entity=song&limit=25&country=CN`
                    );
                    if (!response.ok) throw new Error('搜索失败');
                    const data = await response.json();

                    searchResults = data.results.map(item => ({
                        id: item.trackId,
                        name: item.trackName || '未知歌曲',
                        artist: item.artistName || '未知歌手',
                        album: item.collectionName || '未知专辑',
                        artwork: item.artworkUrl100 ? item.artworkUrl100.replace('100x100bb', '300x300bb') :
                            null,
                        previewUrl: item.previewUrl,
                        duration: item.trackTimeMillis ? Math.round(item.trackTimeMillis / 1000) : 0,
                        trackViewUrl: item.trackViewUrl,
                    }));

                    renderSearchResults();
                } catch (err) {
                    console.error('搜索出错:', err);
                    resultsList.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">😞</div>
                            <p>搜索失败，请检查网络连接后重试</p>
                        </div>`;
                    resultsCount.style.display = 'none';
                    showToast('搜索失败，请检查网络');
                }
            }

            function renderSearchResults() {
                if (searchResults.length === 0) {
                    resultsList.innerHTML = `
                        <div class="empty-state">
                            <div class="icon">🔍</div>
                            <p>没有找到相关歌曲<br>试试其他关键词吧</p>
                        </div>`;
                    resultsCount.style.display = 'none';
                    return;
                }

                resultsCount.style.display = 'inline';
                resultsCount.textContent = `${searchResults.length} 首`;

                resultsList.innerHTML = searchResults.map((track, index) => {
                    const isInPlaylist = playlist.some(p => p.id === track.id);
                    const isActive = currentIndex >= 0 && playlist[currentIndex] && playlist[currentIndex]
                        .id === track.id;
                    const isCurrentlyPlaying = isActive && isPlaying;

                    return `
                        <div class="track-item ${isActive ? 'active' : ''} ${isCurrentlyPlaying ? 'playing' : ''}"
                             data-index="${index}"
                             onclick="window._musicPlayer.playSearchResult(${index})">
                            ${track.artwork
                                ? `<img class="track-thumb" src="${track.artwork}" alt="${track.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">`
                                : ''
                            }
                            <div class="track-thumb-placeholder" style="${track.artwork ? 'display:none;' : ''}">🎵</div>
                            <div class="track-info">
                                <div class="track-name" title="${track.name}">${track.name}</div>
                                <div class="track-artist" title="${track.artist}">${track.artist}</div>
                            </div>
                            <span class="track-duration">${track.duration ? formatTime(track.duration) : '--:--'}</span>
                            <button class="track-add-btn"
                                    onclick="event.stopPropagation();window._musicPlayer.addToPlaylist(${index})"
                                    title="${isInPlaylist ? '已在播放列表' : '添加到播放列表'}">
                                ${isInPlaylist ? '✓' : '+'}
                            </button>
                        </div>`;
                }).join('');
            }

            function playSearchResult(index) {
                const track = searchResults[index];
                if (!track) return;

                // 如果不在播放列表中，先加入
                if (!playlist.some(p => p.id === track.id)) {
                    playlist.push(track);
                }

                // 找到在播放列表中的位置并播放
                const playlistIndex = playlist.findIndex(p => p.id === track.id);
                playTrack(playlistIndex);
                renderSearchResults();
                renderPlaylist();
            }

            function addToPlaylist(index) {
                const track = searchResults[index];
                if (!track) return;

                if (playlist.some(p => p.id === track.id)) {
                    showToast('已在播放列表中');
                    return;
                }

                playlist.push(track);
                showToast(`已添加: ${track.name}`);
                renderSearchResults();
                renderPlaylist();
            }

            // ============ 播放控制 ============
            function playTrack(index) {
                if (index < 0 || index >= playlist.length) return;

                currentIndex = index;
                const track = playlist[currentIndex];

                if (!track.previewUrl) {
                    showToast('该歌曲没有预览链接');
                    // 尝试打开 iTunes 页面
                    if (track.trackViewUrl) {
                        window.open(track.trackViewUrl, '_blank');
                    }
                    return;
                }

                // 加载音频
                audio.src = track.previewUrl;
                audio.load();
                audio.play().then(() => {
                    isPlaying = true;
                    updatePlayButton();
                    updateNowPlaying();
                    renderSearchResults();
                    renderPlaylist();
                    startProgressUpdate();
                }).catch(err => {
                    console.error('播放失败:', err);
                    showToast('播放失败，请重试');
                });
            }

            function togglePlay() {
                if (playlist.length === 0) {
                    showToast('播放列表为空');
                    return;
                }

                if (currentIndex < 0) {
                    playTrack(0);
                    return;
                }

                if (isPlaying) {
                    audio.pause();
                    isPlaying = false;
                    stopProgressUpdate();
                } else {
                    audio.play().then(() => {
                        isPlaying = true;
                        startProgressUpdate();
                    }).catch(err => {
                        console.error('播放失败:', err);
                        showToast('播放失败');
                    });
                }
                updatePlayButton();
                updateNowPlaying();
                renderSearchResults();
                renderPlaylist();
            }

            function playNext() {
                if (playlist.length === 0) return;
                let nextIndex;
                if (isShuffle) {
                    nextIndex = Math.floor(Math.random() * playlist.length);
                } else {
                    nextIndex = (currentIndex + 1) % playlist.length;
                }
                playTrack(nextIndex);
            }

            function playPrev() {
                if (playlist.length === 0) return;
                // 如果播放超过3秒，重新播放当前歌曲
                if (audio.currentTime > 3) {
                    audio.currentTime = 0;
                    return;
                }
                let prevIndex;
                if (isShuffle) {
                    prevIndex = Math.floor(Math.random() * playlist.length);
                } else {
                    prevIndex = (currentIndex - 1 + playlist.length) % playlist.length;
                }
                playTrack(prevIndex);
            }

            function toggleShuffle() {
                isShuffle = !isShuffle;
                shuffleBtn.style.color = isShuffle ? 'var(--primary)' : 'var(--text)';
                showToast(isShuffle ? '随机播放已开启' : '随机播放已关闭');
            }

            function onTrackEnded() {
                stopProgressUpdate();
                if (isShuffle) {
                    playNext();
                } else if (currentIndex < playlist.length - 1) {
                    playNext();
                } else {
                    // 播放列表结束
                    isPlaying = false;
                    updatePlayButton();
                    updateNowPlaying();
                    renderSearchResults();
                    renderPlaylist();
                    showToast('播放列表已播完');
                }
            }

            function onTrackError() {
                stopProgressUpdate();
                isPlaying = false;
                updatePlayButton();
                showToast('音频加载失败，请尝试其他歌曲');
            }

            // ============ UI 更新 ============
            function updatePlayButton() {
                playBtn.textContent = isPlaying ? '⏸' : '▶';
            }

            function updateNowPlaying() {
                if (currentIndex >= 0 && currentIndex < playlist.length) {
                    const track = playlist[currentIndex];
                    nowPlayingTitle.textContent = track.name;
                    nowPlayingArtist.textContent = track.artist + (track.album ? ` · ${track.album}` : '');

                    // 更新专辑封面
                    if (track.artwork) {
                        albumArtContainer.innerHTML =
                            `<img src="${track.artwork}" alt="${track.name}" onerror="this.parentElement.innerHTML='<div class=\\'album-art-placeholder\\'>🎵</div>';">`;
                    } else {
                        albumArtContainer.innerHTML = '<div class="album-art-placeholder">🎵</div>';
                    }

                    if (isPlaying) {
                        albumArtContainer.classList.add('playing');
                    } else {
                        albumArtContainer.classList.remove('playing');
                    }
                } else {
                    nowPlayingTitle.textContent = '暂无播放';
                    nowPlayingArtist.textContent = '选择一首歌曲开始';
                    albumArtContainer.innerHTML = '<div class="album-art-placeholder">🎵</div>';
                    albumArtContainer.classList.remove('playing');
                    currentTimeEl.textContent = '0:00';
                    totalTimeEl.textContent = '0:00';
                    progressFill.style.width = '0%';
                }
            }

            function updateTotalTime() {
                totalTimeEl.textContent = formatTime(audio.duration);
            }

            function startProgressUpdate() {
                stopProgressUpdate();
                progressInterval = setInterval(() => {
                    if (audio.duration && !isNaN(audio.duration)) {
                        const percent = (audio.currentTime / audio.duration) * 100;
                        progressFill.style.width = percent + '%';
                        currentTimeEl.textContent = formatTime(audio.currentTime);
                    }
                }, 200);
            }

            function stopProgressUpdate() {
                if (progressInterval) {
                    clearInterval(progressInterval);
                    progressInterval = null;
                }
            }

            function renderPlaylist() {
                if (playlist.length === 0) {
                    playlistMini.innerHTML = '<div class="playlist-empty">播放列表为空，搜索并添加歌曲吧</div>';
                    return;
                }

                playlistMini.innerHTML = playlist.map((track, index) => {
                    const isActive = index === currentIndex;
                    return `
                        <div class="playlist-item ${isActive ? 'active' : ''}"
                             onclick="window._musicPlayer.playTrackFromPlaylist(${index})">
                            <span class="index">${isActive && isPlaying ? '▶' : index + 1}</span>
                            <span class="name" title="${track.name}">${track.name}</span>
                            <button class="remove-btn"
                                    onclick="event.stopPropagation();window._musicPlayer.removeFromPlaylist(${index})"
                                    title="移除">✕</button>
                        </div>`;
                }).join('');
            }

            function playTrackFromPlaylist(index) {
                if (index === currentIndex) {
                    togglePlay();
                } else {
                    playTrack(index);
                }
            }

            function removeFromPlaylist(index) {
                const removed = playlist[index];
                playlist.splice(index, 1);

                if (index < currentIndex) {
                    currentIndex--;
                } else if (index === currentIndex) {
                    // 正在播放的被移除
                    stopProgressUpdate();
                    audio.pause();
                    audio.src = '';
                    isPlaying = false;
                    if (playlist.length > 0) {
                        if (currentIndex >= playlist.length) {
                            currentIndex = playlist.length - 1;
                        }
                        playTrack(currentIndex);
                    } else {
                        currentIndex = -1;
                        updatePlayButton();
                        updateNowPlaying();
                    }
                }

                renderPlaylist();
                renderSearchResults();
                showToast(`已移除: ${removed.name}`);
            }

            // ============ 进度条点击 ============
            progressBar.addEventListener('click', (e) => {
                if (!audio.duration || isNaN(audio.duration)) return;
                const rect = progressBar.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                audio.currentTime = percent * audio.duration;
                progressFill.style.width = (percent * 100) + '%';
                currentTimeEl.textContent = formatTime(audio.currentTime);
            });

            // ============ 音量控制 ============
            volumeSlider.addEventListener('input', () => {
                const vol = volumeSlider.value / 100;
                audio.volume = vol;
                if (vol === 0) {
                    volumeIcon.textContent = '🔇';
                } else if (vol < 0.5) {
                    volumeIcon.textContent = '🔉';
                } else {
                    volumeIcon.textContent = '🔊';
                }
            });

            volumeIcon.addEventListener('click', () => {
                if (audio.volume > 0) {
                    audio.volume = 0;
                    volumeSlider.value = 0;
                    volumeIcon.textContent = '🔇';
                } else {
                    audio.volume = 0.7;
                    volumeSlider.value = 70;
                    volumeIcon.textContent = '🔊';
                }
            });

            // ============ 键盘快捷键 ============
            document.addEventListener('keydown', (e) => {
                // 不在输入框内才响应快捷键
                if (e.target.tagName === 'INPUT') {
                    if (e.key === 'Enter') {
                        searchMusic(searchInput.value);
                    }
                    return;
                }
                switch (e.key) {
                    case ' ':
                        e.preventDefault();
                        togglePlay();
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        playNext();
                        break;
                    case 'ArrowLeft':
                        e.preventDefault();
                        playPrev();
                        break;
                    case 'ArrowUp':
                        e.preventDefault();
                        audio.volume = Math.min(1, audio.volume + 0.1);
                        volumeSlider.value = Math.round(audio.volume * 100);
                        break;
                    case 'ArrowDown':
                        e.preventDefault();
                        audio.volume = Math.max(0, audio.volume - 0.1);
                        volumeSlider.value = Math.round(audio.volume * 100);
                        break;
                }
            });

            // ============ 事件绑定 ============
            searchBtn.addEventListener('click', () => searchMusic(searchInput.value));
            playBtn.addEventListener('click', togglePlay);
            prevBtn.addEventListener('click', playPrev);
            nextBtn.addEventListener('click', playNext);
            shuffleBtn.addEventListener('click', toggleShuffle);

            // ============ 暴露到全局 ============
            window._musicPlayer = {
                playSearchResult,
                addToPlaylist,
                playTrackFromPlaylist,
                removeFromPlaylist,
            };

            // ============ 初始加载热门歌曲 ============
            // 页面加载时自动搜索一些热门歌曲填充
            setTimeout(() => {
                searchMusic('热门歌曲');
            }, 300);

            console.log('🎵 音乐播放器已就绪');
            console.log('  快捷键: 空格=播放/暂停  ←→=切换歌曲  ↑↓=调节音量');
        })();
    </script>
</body>
</html>
